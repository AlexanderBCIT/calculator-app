<div class="app-wrapper">
  <p-card styleClass="calculator-card">

    <div class="display">
      <p class="display-text">{{ display }}</p>
    </div>

    <div class="button-grid">
      <p-button label="C" styleClass="btn btn-function" (onClick)="clear()" />
      <p-button label="±" styleClass="btn btn-function" (onClick)="toggleSign()" />
      <p-button label="%" styleClass="btn btn-function" (onClick)="inputPercent()" />
      <p-button label="÷" styleClass="btn btn-operator" (onClick)="performOperation('÷')" />

      <p-button label="7" styleClass="btn btn-number" (onClick)="inputDigit('7')" />
      <p-button label="8" styleClass="btn btn-number" (onClick)="inputDigit('8')" />
      <p-button label="9" styleClass="btn btn-number" (onClick)="inputDigit('9')" />
      <p-button label="×" styleClass="btn btn-operator" (onClick)="performOperation('×')" />

      <p-button label="4" styleClass="btn btn-number" (onClick)="inputDigit('4')" />
      <p-button label="5" styleClass="btn btn-number" (onClick)="inputDigit('5')" />
      <p-button label="6" styleClass="btn btn-number" (onClick)="inputDigit('6')" />
      <p-button label="-" styleClass="btn btn-operator" (onClick)="performOperation('-')" />

      <p-button label="1" styleClass="btn btn-number" (onClick)="inputDigit('1')" />
      <p-button label="2" styleClass="btn btn-number" (onClick)="inputDigit('2')" />
      <p-button label="3" styleClass="btn btn-number" (onClick)="inputDigit('3')" />
      <p-button label="+" styleClass="btn btn-operator" (onClick)="performOperation('+')" />

      <p-button label="0" styleClass="btn btn-number btn-zero" (onClick)="inputDigit('0')" />
      <p-button label="." styleClass="btn btn-number" (onClick)="inputDecimal()" />
      <p-button label="⌫" styleClass="btn btn-function" (onClick)="backspace()" />
      <p-button label="=" styleClass="btn btn-equals" (onClick)="equals()" />
    </div>

  </p-card>
</div>
